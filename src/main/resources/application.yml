server:
  port: ${SERVER_PORT:8080}
  threads:
    virtual:
      enabled: true

spring:
  application:
    name: argus-central-hub
  
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:argus_central_hub}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30s
      connection-timeout: 30s
      pool-name: ArgusHikariCP
  
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 10s
      lettuce:
        pool:
          max-active: 8
          max-wait: -1s
          max-idle: 8
          min-idle: 0

logging:
  level:
    com.argus.centralhub: ${LOG_LEVEL:DEBUG}
    org.hibernate.SQL: ${HIBERNATE_LOG_LEVEL:DEBUG}

cloud:
  provider:
    third-party:
      - code: ${THIRD_PARTY_CLOUD_CODE:CUSTOM_CLOUD}
        label: ${THIRD_PARTY_CLOUD_LABEL:自定义云厂商}
        api-endpoint: ${THIRD_PARTY_CLOUD_API_ENDPOINT:https://api.custom-cloud.com}
        auth-type: ${THIRD_PARTY_CLOUD_AUTH_TYPE:API_KEY}
        access-key: ${THIRD_PARTY_CLOUD_ACCESS_KEY:}
        secret-key: ${THIRD_PARTY_CLOUD_SECRET_KEY:}
        region: ${THIRD_PARTY_CLOUD_REGION:cn-east-1}
