server:
  port: ${SERVER_PORT:8080}
  threads:
    virtual:
      enabled: true

spring:
  application:
    name: argus-central-hub
  
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:argus_central_hub}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30s
      connection-timeout: 30s
      pool-name: ArgusHikariCP
  
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 10s
      lettuce:
        pool:
          max-active: 8
          max-wait: -1s
          max-idle: 8
          min-idle: 0

  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: ${MAIL_PROTOCOL:smtp}
    default-encoding: UTF-8
    to: ${MAIL_TO:}
    smtp:
      auth: true
      start-tls-enable: true
      ssl-enable: false
      ssl-trust: ${MAIL_HOST:smtp.qq.com}

logging:
  level:
    com.argus.centralhub: ${LOG_LEVEL:DEBUG}
    org.hibernate.SQL: ${HIBERNATE_LOG_LEVEL:DEBUG}

cloud:
  provider:
    third-party:
      - code: ${THIRD_PARTY_CLOUD_CODE:CUSTOM_CLOUD}
        label: ${THIRD_PARTY_CLOUD_LABEL:自定义云厂商}
        api-endpoint: ${THIRD_PARTY_CLOUD_API_ENDPOINT:https://api.custom-cloud.com}
        auth-type: ${THIRD_PARTY_CLOUD_AUTH_TYPE:API_KEY}
        access-key: ${THIRD_PARTY_CLOUD_ACCESS_KEY:}
        secret-key: ${THIRD_PARTY_CLOUD_SECRET_KEY:}
        region: ${THIRD_PARTY_CLOUD_REGION:cn-east-1}

cache:
  ttl-minutes: 3
  local-cache:
    enabled: true
  distributed:
    enabled: true

rate-limit:
  local:
    enabled: true
    limit: 100
    window-seconds: 60
  distributed:
    enabled: true
    limit: 500
    window-seconds: 60
  max-wait-retries: 3
  retry-interval-ms: 500

scheduler:
  instance-sync:
    enabled: ${INSTANCE_SYNC_ENABLED:true}
    cron: ${INSTANCE_SYNC_CRON:0 */5 * * * ?}
    default-region: ${INSTANCE_SYNC_DEFAULT_REGION:cn-east-1}
    regions:
      ALIYUN:
        - cn-hangzhou
        - cn-beijing
        - cn-shanghai
      AWS:
        - cn-north-1
        - cn-northwest-1
      TENCENT:
        - ap-guangzhou
        - ap-shanghai
      HUAWEI:
        - cn-south-1
        - cn-east-3
      AZURE:
        - chinaeast
        - chinanorth
      GOOGLE_CLOUD:
        - asia-east1
        - asia-southeast1
      VOLCENGINE:
        - cn-beijing
        - cn-shanghai
      JD_CLOUD:
        - cn-north-1
        - cn-east-2
      ORACLE:
        - ap-chuncheon-1
        - ap-seoul-1

shutdown-rule:
  enabled: ${SHUTDOWN_RULE_ENABLED:false}
  cron: ${SHUTDOWN_RULE_CRON:0 0 * * * ?}
  time-window:
    start-hour: ${SHUTDOWN_RULE_START_HOUR:1}
    end-hour: ${SHUTDOWN_RULE_END_HOUR:6}
  tag-rules:
    - key: env
      value: dev

feishu:
  bot:
    app-id: ${FEISHU_APP_ID:}
    app-secret: ${FEISHU_APP_SECRET:}
    verification-token: ${FEISHU_VERIFICATION_TOKEN:}
    encrypt-key: ${FEISHU_ENCRYPT_KEY:}
    tenant-key: ${FEISHU_TENANT_KEY:}
    allowed-operator-ids: ${FEISHU_ALLOWED_OPERATOR_IDS:}
    alert-receiver-open-id: ${FEISHU_ALERT_RECEIVER_OPEN_ID:}
    alert-receiver-chat-id: ${FEISHU_ALERT_RECEIVER_CHAT_ID:}

llm:
  enabled: ${LLM_ENABLED:false}
  api-key: ${LLM_API_KEY:}
  api-endpoint: ${LLM_API_ENDPOINT:https://api.deepseek.com/v1}
  model: ${LLM_MODEL:deepseek-chat}
  temperature: ${LLM_TEMPERATURE:0.7}
  max-tokens: ${LLM_MAX_TOKENS:2048}
  timeout:
    connect-ms: ${LLM_TIMEOUT_CONNECT_MS:10000}
    read-ms: ${LLM_TIMEOUT_READ_MS:60000}
  retry:
    max-attempts: ${LLM_RETRY_MAX_ATTEMPTS:3}
    initial-delay-ms: ${LLM_RETRY_INITIAL_DELAY_MS:1000}
    multiplier: ${LLM_RETRY_MULTIPLIER:2.0}
    max-delay-ms: ${LLM_RETRY_MAX_DELAY_MS:10000}
